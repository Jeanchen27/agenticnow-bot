name: AgenticNow Daily Bot

on:
  # 定时触发由 cron-job.org 负责，精确到分钟
  # 每日一次：北京时间 12:00（UTC 04:00）

  # 手动 / 外部触发（cron-job.org 调用此接口）
  workflow_dispatch:
    inputs:
      dry_run:
        description: '预览模式（不推送 Telegram）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      max_articles:
        description: '最多推送文章数（默认 12，范围 10-15）'
        required: false
        default: ''
        type: string
      publish_mode:
        description: '推送模式'
        required: false
        default: 'digest'
        type: choice
        options:
          - 'digest'
          - 'individual'

permissions:
  contents: write   # 用于提交 seen_urls.json

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AgenticNow Bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PUBLISH_MODE: ${{ github.event.inputs.publish_mode || 'digest' }}
        run: |
          ARGS=""

          # 干跑模式
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # 文章数：手动触发可覆盖，否则默认 12 篇
          MANUAL_MAX="${{ github.event.inputs.max_articles }}"
          if [ -n "$MANUAL_MAX" ]; then
            ARGS="$ARGS --max-articles $MANUAL_MAX"
          else
            ARGS="$ARGS --max-articles 12"
          fi

          # RSS Lookback 窗口：168h（7天）确保周刊/双周刊能被捕获
          ARGS="$ARGS --rss-lookback 168"

          # 推送模式
          ARGS="$ARGS --mode ${{ github.event.inputs.publish_mode || 'digest' }}"

          # 保存过滤报告（每次运行都存入 reports/）
          ARGS="$ARGS --save-report"

          echo "Running: python pipeline.py $ARGS"
          python pipeline.py $ARGS

      - name: Commit updated seen_urls.json
        # 仅在非预览模式下提交
        if: github.event.inputs.dry_run != 'true'
        run: |
          if git diff --quiet seen_urls.json 2>/dev/null || [ ! -f seen_urls.json ]; then
            echo "No changes to seen_urls.json, skipping commit."
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add seen_urls.json
            git commit -m "chore: update seen_urls.json [skip ci]"
            git pull --rebase origin main
            git push
          fi
