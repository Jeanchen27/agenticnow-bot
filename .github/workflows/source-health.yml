name: AgenticNow Source Health Check

on:
  # 每周一 UTC 01:00 = 北京时间 09:00 做一次全量信源检测
  schedule:
    - cron: '0 1 * * 1'

  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full source health check
        id: health
        run: |
          # 输出检测报告并捕获退出码
          python scripts/check_sources.py --verbose 2>&1 | tee /tmp/health_report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Notify admin via Telegram if errors found
        if: steps.health.outputs.exit_code != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: |
          # 提取错误信源摘要（去掉 ANSI 颜色码）
          REPORT=$(cat /tmp/health_report.txt | sed 's/\x1b\[[0-9;]*m//g' | grep -A 50 "错误信源" | head -20)
          MESSAGE="⚠️ <b>AgenticNow 信源检测警告</b>%0A%0A${REPORT}%0A%0A请检查并更新失效信源的 RSS 地址。"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_ADMIN_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" || true
