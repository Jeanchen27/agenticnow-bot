name: AgenticNow Skill Pipeline

on:
  # 每 3 天运行一次：北京时间 12:00（UTC 04:00）
  # 每月 1、4、7、10、13、16、19、22、25、28 日触发
  schedule:
    - cron: '0 4 */3 * *'

  # 手动触发（测试用）
  workflow_dispatch:
    inputs:
      dry_run:
        description: '预览模式（不推送 Telegram）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      top:
        description: '推送 Top N 个 Skill（默认 20）'
        required: false
        default: '20'
        type: string

permissions:
  contents: write   # 用于提交 seen_skill_ids.json

jobs:
  run-skill-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Skill Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: |
          ARGS=""

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          TOP="${{ github.event.inputs.top }}"
          if [ -n "$TOP" ]; then
            ARGS="$ARGS --top $TOP"
          fi

          echo "Running: python3 skill_pipeline.py $ARGS"
          python3 skill_pipeline.py $ARGS

      - name: Commit updated seen_skill_ids.json
        if: github.event.inputs.dry_run != 'true'
        run: |
          if git diff --quiet seen_skill_ids.json 2>/dev/null || [ ! -f seen_skill_ids.json ]; then
            echo "No changes to seen_skill_ids.json, skipping commit."
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add seen_skill_ids.json
            git commit -m "chore: update seen_skill_ids.json [skip ci]"
            git push
          fi
